<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <title>Monopolio Pacífico</title>
    <style>
        body { background: #001a33; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .stats-box { background: #004080; padding: 15px; border-bottom: 3px solid #00ffcc; }
        .tablero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #333; margin: 10px auto; width: 90%; max-width: 350px; }
        .casilla { background: #e0f7fa; color: #333; height: 55px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; border-radius: 4px; }
        .ficha { width: 14px; height: 14px; background: #ff3300; border-radius: 50%; border: 2px solid white; position: absolute; z-index: 10; }
        .boton { background: #00ffcc; border: none; padding: 15px; color: black; border-radius: 30px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; width: 80%; box-shadow: 0 4px 0 #00997a; }
        .boton:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>
    <div class="stats-box">
        <h2 id="txtRol">Asignando...</h2>
        <h3 id="txtDinero">$0</h3>
    </div>

    <div class="tablero" id="contenedorTablero"></div>

    <div id="txtInfo" style="padding: 10px; color: #00ffcc; min-height: 40px;">¡Toca el botón para jugar!</div>
    <button class="boton" onclick="lanzarDados()">🎲 TIRAR DADOS</button>

    <script>
        // 1. Iniciar Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 2. Datos del Juego
        const listaIslas = ["SALIDA", "Norfolk", "Navidad", "LAVA", "Marshall", "Marianas", "CÁRCEL", "Guam", "Tonga", "AZUL", "Samoa", "Cook"];
        const listaRoles = ["The Rich Man", "The President", "Normal Player", "The Special", "El Afortunado"];
        
        let miRol = listaRoles[Math.floor(Math.random() * listaRoles.length)];
        let miDinero = (miRol === "The Rich Man") ? 3000 : 1500;
        let miPosicion = 0;

        // 3. Mostrar Datos Iniciales
        document.getElementById('txtRol').innerText = "Rol: " + miRol;
        document.getElementById('txtDinero').innerText = "$" + miDinero;

        // 4. Crear el Tablero Visual
        const cajaTablero = document.getElementById('contenedorTablero');
        listaIslas.forEach((nombre, i) => {
            const divCasilla = document.createElement('div');
            divCasilla.className = 'casilla';
            divCasilla.id = 'cas-' + i;
            divCasilla.innerText = nombre;
            cajaTablero.appendChild(divCasilla);
        });

        // 5. Función para mover la ficha roja
        function refrescarFicha() {
            const vieja = document.querySelector('.ficha');
            if (vieja) vieja.remove();
            
            const nuevaFicha = document.createElement('div');
            nuevaFicha.className = 'ficha';
            document.getElementById('cas-' + miPosicion).appendChild(nuevaFicha);
        }

        // 6. Función del Botón
        function lanzarDados() {
            const dado = Math.floor(Math.random() * 6) + 1;
            miPosicion = (miPosicion + dado) % listaIslas.length;
            
            // Lógica: Si no es casilla especial, resta dinero (compra)
            if (miPosicion !== 0 && miPosicion !== 3 && miPosicion !== 6 && miPosicion !== 9) {
                miDinero -= 100;
                document.getElementById('txtInfo').innerText = "Sacaste " + dado + ". ¡Compraste " + listaIslas[miPosicion] + "!";
            } else {
                document.getElementById('txtInfo').innerText = "Sacaste " + dado + ". Caíste en " + listaIslas[miPosicion];
            }

            document.getElementById('txtDinero').innerText = "$" + miDinero;
            refrescarFicha();
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 7. Poner ficha inicial
        refrescarFicha();
    </script>
</body>
</html>
