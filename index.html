<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacifico</title>
    <style>
        body { background: #001a33; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .stats { background: #004080; padding: 15px; border-bottom: 3px solid #00ffcc; }
        .tablero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #333; margin: 10px auto; width: 90%; max-width: 300px; }
        .casilla { background: #e0f7fa; color: #333; height: 50px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .ficha { width: 14px; height: 14px; background: red; border-radius: 50%; border: 2px solid white; position: absolute; }
        .boton { background: #00ffcc; border: none; padding: 15px; color: black; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 10px; width: 80%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="stats">
        <h2 id="txtRol">Rol: Cargando...</h2>
        <h3 id="txtDinero">Dinero: $0</h3>
    </div>
    <div class="tablero" id="mapa"></div>
    <div id="txtInfo" style="padding:10px; color:#00ffcc;">¡Toca el botón!</div>
    <button class="boton" onclick="jugar()">🎲 TIRAR DADOS</button>

    <script>
        const islas = ["SALIDA", "Norfolk", "Navidad", "LAVA", "Marshall", "Marianas", "CÁRCEL", "Guam", "Tonga", "AZUL", "Samoa", "Cook"];
        const roles = ["The Rich Man", "The President", "Normal Player", "The Special", "El Afortunado"];
        
        let miRol = roles[Math.floor(Math.random() * roles.length)];
        let miDinero = (miRol === "The Rich Man") ? 3000 : 1500;
        let miPos = 0;

        document.getElementById('txtRol').innerText = "Rol: " + miRol;
        document.getElementById('txtDinero').innerText = "Dinero: $" + miDinero;

        const contenedor = document.getElementById('mapa');
        islas.forEach((nombre, i) => {
            const div = document.createElement('div');
            div.className = 'casilla';
            div.id = 'c' + i;
            div.innerText = nombre;
            contenedor.appendChild(div);
        });

        function mover() {
            const vieja = document.querySelector('.ficha');
            if (vieja) vieja.remove();
            const ficha = document.createElement('div');
            ficha.className = 'ficha';
            document.getElementById('c' + miPos).appendChild(ficha);
        }

        function jugar() {
            const dado = Math.floor(Math.random() * 6) + 1;
            miPos = (miPos + dado) % islas.length;
            
            if (miPos % 3 !== 0) {
                miDinero -= 100;
                document.getElementById('txtInfo').innerText = "Sacaste " + dado + ". ¡Compraste " + islas[miPos] + "!";
            } else {
                document.getElementById('txtInfo').innerText = "Sacaste " + dado + ". Caíste en " + islas[miPos];
            }
            document.getElementById('txtDinero').innerText = "Dinero: $" + miDinero;
            mover();
        }
        mover();
    </script>
</body>
</html>
