<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #001a33; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .cabecera { background: #004080; padding: 15px; border-bottom: 2px solid #00ffcc; }
        .tablero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #333; margin: 10px auto; width: 90%; max-width: 380px; }
        .isla { background: #e0f7fa; color: #333; height: 60px; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; border-radius: 3px; border-bottom: 4px solid #ccc; }
        .marrón { border-bottom-color: #8B4513; } .celeste { border-bottom-color: #87CEEB; } .rosa { border-bottom-color: #FF69B4; } .especial { background: #ffeb3b; }
        .ficha { width: 14px; height: 14px; background: #ff3300; border-radius: 50%; border: 2px solid white; position: absolute; z-index: 10; }
        .boton { background: #00ffcc; border: none; padding: 15px; color: black; border-radius: 30px; font-weight: bold; font-size: 18px; margin: 15px; cursor: pointer; width: 85%; box-shadow: 0 4px 0 #00997a; }
    </style>
</head>
<body>
    <div class="cabecera">
        <h2 id="mostrarRol">Cargando...</h2>
        <div style="display:flex; justify-content: space-around;">
            <span>💰 $<span id="mostrarDinero">0</span></span>
            <span>📍 <span id="mostrarPos">Salida</span></span>
        </div>
    </div>

    <div class="tablero" id="miTablero"></div>

    <div id="txtInfo" style="padding:10px; color:#00ffcc; font-size:13px; min-height:40px;">¡Tira los dados!</div>
    <button class="boton" onclick="lanzar()">🎲 TIRAR DADOS</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const islasPacífico = [
            {n: "SALIDA", p: 0, g: "especial"}, {n: "Norfolk", p: 60, g: "marrón"}, 
            {n: "Navidad", p: 60, g: "marrón"}, {n: "LAVA", p: 0, g: "especial"},
            {n: "Marshall", p: 100, g: "celeste"}, {n: "Marianas", p: 100, g: "celeste"}, 
            {n: "CÁRCEL", p: 0, g: "especial"}, {n: "Guam", p: 120, g: "celeste"},
            {n: "Tonga", p: 140, g: "rosa"}, {n: "AZUL", p: 0, g: "especial"}, 
            {n: "Samoa", p: 140, g: "rosa"}, {n: "Cook", p: 160, g: "rosa"}
        ];

        const listaRoles = ["The Rich Man", "The President", "Normal Player", "The Special", "El Afortunado"];
        let miRol = listaRoles[Math.floor(Math.random() * listaRoles.length)];
        let miDinero = (miRol === "The Rich Man") ? 3000 : 1500;
        let miPos = 0;

        document.getElementById('mostrarRol').innerText = "Rol: " + miRol;
        document.getElementById('mostrarDinero').innerText = miDinero;

        const contenedor = document.getElementById('miTablero');
        islasPacífico.forEach((isla, i) => {
            const div = document.createElement('div');
            div.className = "isla " + isla.g;
            div.id = "cas-" + i;
            div.innerText = isla.n;
            contenedor.appendChild(div);
        });

        function actualizarFicha() {
            const vieja = document.querySelector('.ficha');
            if (vieja) vieja.remove();
            const ficha = document.createElement('div');
            ficha.className = 'ficha';
            document.getElementById("cas-" + miPos).appendChild(ficha);
            document.getElementById('mostrarPos').innerText = islasPacífico[miPos].n;
        }

        function lanzar() {
            const dado = Math.floor(Math.random() * 6) + 1;
            miPos = (miPos + dado) % islasPacífico.length;
            
            const islaActual = islasPacífico[miPos];
            let mensaje = "Sacaste " + dado + ". Caíste en " + islaActual.n;

            if (islaActual.p > 0) {
                miDinero -= 100; // Compra fija para probar
                mensaje += ". ¡Comprada por $100!";
            }

            document.getElementById('mostrarDinero').innerText = miDinero;
            document.getElementById('txtInfo').innerText = mensaje;
            actualizarFicha();
            tg.HapticFeedback.impactOccurred('medium');
        }

        actualizarFicha();
    </script>
</body>
</html>
