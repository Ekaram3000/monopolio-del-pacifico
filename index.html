<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #001a33; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .tablero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #333; margin: 10px; }
        .isla { background: #e0f7fa; color: #333; height: 60px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .ficha { width: 15px; height: 15px; background: red; border-radius: 50%; border: 2px solid white; position: absolute; }
        .boton { background: #00ffcc; border: none; padding: 20px; color: black; border-radius: 10px; font-weight: bold; width: 80%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div style="background: #004080; padding: 15px;">
        <h2 id="miRol">Cargando...</h2>
        <h3>💰 $<span id="miDinero">0</span></h3>
    </div>

    <div class="tablero" id="mapa"></div>

    <p id="info">¡Toca el botón para jugar!</p>
    <button class="boton" onclick="jugar()">🎲 TIRAR DADOS</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const misIslas = ["SALIDA", "Norfolk", "Navidad", "LAVA", "Marshall", "Marianas", "CÁRCEL", "Guam", "Tonga", "AZUL", "Samoa", "Cook"];
        const misRoles = ["The Rich Man", "The President", "Normal Player", "The Special", "El Afortunado"];
        
        let rol = misRoles[Math.floor(Math.random() * misRoles.length)];
        let dinero = (rol === "The Rich Man") ? 3000 : 1500;
        let posicion = 0;

        document.getElementById('miRol').innerText = "Eres: " + rol;
        document.getElementById('miDinero').innerText = dinero;

        const contenedor = document.getElementById('mapa');
        misIslas.forEach((nombre, i) => {
            const div = document.createElement('div');
            div.className = 'isla';
            div.id = 'casilla-' + i;
            div.innerText = nombre;
            contenedor.appendChild(div);
        });

        function moverFicha() {
            const vieja = document.querySelector('.ficha');
            if (vieja) vieja.remove();
            const ficha = document.createElement('div');
            ficha.className = 'ficha';
            document.getElementById('casilla-' + posicion).appendChild(ficha);
        }

        function jugar() {
            const dado = Math.floor(Math.random() * 6) + 1;
            posicion = (posicion + dado) % misIslas.length;
            
            if (posicion !== 0 && posicion !== 3 && posicion !== 6 && posicion !== 9) {
                dinero -= 100;
                document.getElementById('info').innerText = "Sacaste " + dado + ". ¡Compraste " + misIslas[posicion] + "!";
            } else {
                document.getElementById('info').innerText = "Sacaste " + dado + ". Caíste en " + misIslas[posicion];
            }

            document.getElementById('miDinero').innerText = dinero;
            moverFicha();
            tg.HapticFeedback.impactOccurred('medium');
        }

        moverFicha();
    </script>
</body>
</html>
